# Global settings
transfer.days=90

# Comma-separated list of table keys to process
transfer.tables=orders,customers,invoices

# Per-table date column config (key must match entries in transfer.tables)
table.orders.name=orders
table.orders.dateColumn=created_at

table.customers.name=customers
table.customers.dateColumn=created_at

table.invoices.name=invoices
table.invoices.dateColumn=invoice_date

# ---- Add remaining tables the same way (up to 50) ----
# table.<key>.name=<actual_table_name>
# table.<key>.dateColumn=<date_column_name>